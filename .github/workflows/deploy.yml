name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; don't cancel an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # The ~620 MB of CSVs are fetched, not committed. Cache them between runs
      # so we only hit Google Drive when fetch_data.py (the file ids) changes.
      - name: Cache datasets
        uses: actions/cache@v4
        with:
          path: data
          key: datablist-csvs-${{ hashFiles('scripts/fetch_data.py') }}
          restore-keys: datablist-csvs-

      - name: Fetch datasets
        run: python scripts/fetch_data.py

      - name: Build static site
        # MISTRAL_API_KEY powers the <Ask /> component. Set it as a repo secret
        # (Settings → Secrets → Actions) for live AI commentary. Without it the
        # build still succeeds — the Ask cards just show a "no key" notice.
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY || 'no-key-set' }}
        run: |
          dashdown build . --out .dist
          touch .dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
